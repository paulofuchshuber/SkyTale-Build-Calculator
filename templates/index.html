<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyTale Build Calculator</title>
    <link rel="icon" href="https://www.skytale.com.br/assets/skytale-logo.png">
    <style>
        /* Visual identity adjusted to resemble SkyTale: dark, blue accents */
        :root{ --bg:#06070a; --panel:#0f1720; --accent:#1e90ff; --muted:#cfd8e3 }
        body { background: linear-gradient(180deg,var(--bg),#000); color:var(--muted); font-family:Inter,Arial,Helvetica,sans-serif; }
        .header { display:flex; align-items:center; gap:12px; padding:18px 12px; background:linear-gradient(90deg, rgba(30,144,255,0.06), transparent); border-bottom:1px solid rgba(255,255,255,0.04); }
        .header img.logo { height:56px; width:auto; display:block; }
        .header .brand { font-size:20px; color:#fff; font-weight:700; letter-spacing:0.6px }
        .title { text-align:center; color:#fff; margin:12px 0; }
        .card { background:var(--panel); border:1px solid rgba(255,255,255,0.03); border-radius:10px }
        .slots { display:flex; flex-wrap:wrap; gap:12px; justify-content:center; }
        .slot {
            width:160px; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; border:4px solid rgba(255,255,255,0.04); padding:8px; box-sizing:border-box; background:transparent; color:var(--muted); border-radius:10px;
        }
        .canvas { display:flex; align-items:center; justify-content:center; overflow:visible; background:transparent; }
        .canvas img { display:block; max-width:none; max-height:none; }
        .placeholder { display:block; }
        select { width:100%; margin-top:6px; }
        label { color:var(--muted); font-size:12px; }
    </style>
</head>
<body>
    <h1 class="title">SkyTale Build Calculator</h1>
    <div class="slots">
    {% for slot in slots %}
        {% set size = slot_sizes[slot.name] %}
        <div class="slot" id="slot-{{ loop.index0 }}">
            <strong>{{ slot.name }}</strong>
            <div class="canvas" id="canvas-{{ loop.index0 }}" style="width:{{ size.w }}px; height:{{ size.h }}px;">
                <div class="placeholder" id="ph-{{ loop.index0 }}" style="width:100%;height:100%;background:#000;"></div>
                <img id="img-{{ loop.index0 }}" src="" alt="" style="display:none;" />
            </div>
            <select id="select-{{ loop.index0 }}" onchange="updateImage({{ loop.index0 }})" style="margin-top:6px;">
                <option value="">— selecione —</option>
                {% for cat, items in slot_items[slot.name].items() %}
                    <optgroup label="--{{ cat|capitalize }}--">
                    {% for item in items %}
                        {% if item.assets and item.assets.assetFile %}
                        <option value="{{ item.assets.assetFile }}">{{ item.name_en }}</option>
                        {% endif %}
                    {% endfor %}
                    </optgroup>
                {% endfor %}
            </select>
            <label style="display:block;margin-top:6px;color:white;">Raridade:</label>
            <select id="rarity-{{ loop.index0 }}" onchange="changeRarity({{ loop.index0 }})">
                <option value="normal" selected>Normal</option>
                <option value="rare">Raro</option>
                <option value="epic">Épico</option>
                <option value="legendary">Lendário</option>
            </select>

            <label style="display:block;margin-top:6px;color:white;">Spec:</label>
            <select id="spec-{{ loop.index0 }}" onchange="changeSpec({{ loop.index0 }})">
                <option value="">— selecione spec —</option>
            </select>

            <div id="info-{{ loop.index0 }}" style="width:100%;margin-top:8px;font-size:12px;color:#ddd;">
                <div><strong>Stats:</strong><div id="stats-{{ loop.index0 }}"></div></div>
                <div style="margin-top:6px;"><strong>Requirements:</strong><div id="reqs-{{ loop.index0 }}"></div></div>
            </div>
        </div>
    {% endfor %}
    </div>

    <div id="aggregate-panel" style="width:90%;max-width:900px;margin:20px auto;padding:12px;border:2px dashed #666;border-radius:8px;">
        <h3 style="margin:0 0 8px 0;">Stats finais</h3>
        <div id="aggregate-results" style="font-size:14px;color:#ddd;"></div>
    </div>

    <script>
        const rarityColors = {
            normal: '#2ecc71',
            rare: '#5dade2',
            epic: '#9b59b6',
            legendary: '#f1c40f'
        };

        // Items map injected from backend
        const ITEMS = {{ items_map | tojson }};

        /*
         * Regra dos Itens Especializados (tabela de modificadores)
         * Cada entrada contém um intervalo {min, max} em decimal (ex: 0.05 = +5%, -0.25 = -25%).
         * Destaque: a tabela abaixo reflete exatamente os intervalos fornecidos na especificação.
         */
        const SPEC_MODS = {
            Mechanician: {strength: {min:0.05, max:0.10}, intelligence: {min:-0.20, max:-0.10}, talent: null, agility: {min:-0.25, max:-0.15}},
            Fighter:     {strength: {min:0.10, max:0.15}, intelligence: {min:-0.20, max:-0.15}, talent: null, agility: {min:-0.20, max:-0.15}},
            Pikeman:     {strength: {min:0.10, max:0.15}, intelligence: {min:-0.20, max:-0.15}, talent: null, agility: {min:-0.25, max:-0.15}},
            Archer:      {strength: {min:-0.25, max:-0.15}, intelligence: {min:-0.20, max:-0.10}, talent: null, agility: {min:0.15, max:0.25}},
            Knight:      {strength: {min:0.05, max:0.15}, intelligence: {min:-0.15, max:-0.10}, talent: {min:0.05, max:0.10}, agility: {min:-0.25, max:-0.15}},
            Atalanta:    {strength: {min:-0.20, max:-0.15}, intelligence: {min:-0.20, max:-0.10}, talent: null, agility: {min:0.15, max:0.25}},
            Priestess:   {strength: {min:-0.25, max:-0.20}, intelligence: {min:0.15, max:0.20}, talent: {min:-0.15, max:-0.10}, agility: {min:-0.20, max:-0.15}},
            Mage:        {strength: {min:-0.25, max:-0.20}, intelligence: {min:0.15, max:0.25}, talent: {min:-0.15, max:-0.10}, agility: {min:-0.20, max:-0.15}},
            Shaman:      {strength: {min:-0.25, max:-0.20}, intelligence: {min:0.15, max:0.25}, talent: {min:-0.15, max:-0.10}, agility: {min:-0.20, max:-0.15}},
            Assassin:    {strength: {min:0.05, max:0.15}, intelligence: {min:-0.20, max:-0.10}, talent: null, agility: {min:-0.20, max:-0.15}},
            Guerriera:   {strength: {min:0.05, max:0.15}, intelligence: {min:-0.20, max:-0.10}, talent: null, agility: {min:-0.20, max:-0.15}}
        };

        function updateImage(idx){
            const s = document.getElementById('select-'+idx);
            const i = document.getElementById('img-'+idx);
            const ph = document.getElementById('ph-'+idx);
            const canvas = document.getElementById('canvas-'+idx);
            const val = s.value || '';
            if(val){
                i.src = val;
                i.style.display = 'block';
                ph.style.display = 'none';
                canvas.style.alignItems = 'center';
                canvas.style.justifyContent = 'center';
                // populate spec select and info
                const item = ITEMS[val];
                populateSpec(idx, item);
                renderAll(idx, item);
                updateAggregates();
            } else {
                i.src = '';
                i.style.display = 'none';
                ph.style.display = 'block';
                // clear spec and info
                const spec = document.getElementById('spec-'+idx);
                spec.innerHTML = '<option value="">— selecione spec —</option>';
                document.getElementById('stats-'+idx).innerText = '';
                document.getElementById('reqs-'+idx).innerText = '';
                // update aggregates after clearing selection to avoid residual stats
                updateAggregates();
            }
        }

        function populateSpec(idx, item){
            const specEl = document.getElementById('spec-'+idx);
            specEl.innerHTML = '<option value="">— selecione spec —</option>';
            if(!item || !item.spec || !item.spec.primaryClass) return;
            const classes = item.spec.primaryClass.split(/\s+/).filter(Boolean);
            classes.forEach(c=>{
                const opt = document.createElement('option');
                opt.value = c;
                opt.text = c;
                specEl.appendChild(opt);
            });
        }

        function changeSpec(idx){
            const select = document.getElementById('select-'+idx);
            const val = select.value;
            if(!val) return;
            const item = ITEMS[val];
            renderAll(idx, item);
            updateAggregates();
        }

        function changeRarity(idx){
            const r = document.getElementById('rarity-'+idx).value || 'normal';
            const slot = document.getElementById('slot-'+idx);
            slot.style.border = '4px solid ' + (rarityColors[r] || rarityColors.normal);
            slot.style.borderRadius = '10px';
            // re-render stats/reqs if item selected
            const select = document.getElementById('select-'+idx);
            const val = select.value;
            if(val){
                const item = ITEMS[val];
                renderAll(idx, item);
                updateAggregates();
            }
        }

        function renderAll(idx, item){
            if(!item) return;
            const rarity = document.getElementById('rarity-'+idx).value || 'normal';
            const spec = document.getElementById('spec-'+idx).value || '';
            renderStats(idx, item, rarity);
            renderReqs(idx, item, spec);
        }

        // Apply rarity bonuses to a shallow copy of stats and return a simple key->value object for display
        function renderStats(idx, item, rarity){
            const sub = item.subCategory || '';
            const isWeapon = ['machados','garras','varinhas','foices','lancas','arcos','martelos','espadas'].includes(sub);
            const isBootsOrGloves = ['botas','luvas'].includes(sub);
            const isArmorOrRobe = ['armaduras','roupoes'].includes(sub);
            const isShield = ['escudos','orbitais'].includes(sub);
            const isBracelet = ['braceletes'].includes(sub);

            // base stats - flatten for display, prefer min/max pairs when available
            const out = {};
            if(item.stats){
                for(const k in item.stats){
                    const v = item.stats[k];
                    if(k === 'absorption'){
                        const aMin = Number(item.stats['absorption'] || 0);
                        const aMax = Number(item.stats['absorption_max'] || aMin);
                        out['absorption'] = aMin + ' - ' + aMax;
                        continue;
                    }
                    if (k === 'absorption_max') continue; 
                    if(k === 'attackRating'){
                        const aMin = Number(item.stats['attackRating'] || 0);
                        const aMax = Number(item.stats['attackRating_max'] || aMin);
                        out['attackRating'] = aMin + ' - ' + aMax;
                        continue;
                    }
                    if (k === 'attackRating_max') continue;
                    if(typeof v === 'level') out[k] = v;
                    else if(v && v.min && v.min.min!==undefined) out[k] = v.min.min + ' - ' + (v.max && v.max.min ? v.max.min : v.min.max || v.min.min);
                    else out[k] = JSON.stringify(v);
                }
            }

            // apply rarity bonuses
            let atkPowerBonus=0, atkRatingBonus=0, defBonus=0, absBonus=0;
            if(rarity === 'rare'){
                if(isWeapon){ atkPowerBonus = 4; atkRatingBonus = 10; }
                if(isBootsOrGloves){ defBonus = 10; absBonus = 1; }
                if(isArmorOrRobe){ defBonus = 30; absBonus = 1; }
                if(isShield){ absBonus = 1; }
                if(isBracelet){ atkRatingBonus = 10; }
            } else if(rarity === 'epic'){
                if(isWeapon){ atkPowerBonus = 8; atkRatingBonus = 20; }
                if(isBootsOrGloves){ defBonus = 20; absBonus = 2; }
                if(isArmorOrRobe){ defBonus = 60; absBonus = 2; }
                if(isShield){ absBonus = 2; }
                if(isBracelet){ atkRatingBonus = 20; }
            } else if(rarity === 'legendary'){
                if(isWeapon){ atkPowerBonus = 12; atkRatingBonus = 30; }
                if(isBootsOrGloves){ defBonus = 30; absBonus = 3; }
                if(isArmorOrRobe){ defBonus = 90; absBonus = 3; }
                if(isShield){ absBonus = 3; }
                if(isBracelet){ atkRatingBonus = 30; }
            }

            // apply to flattened out
            if(atkPowerBonus && out.attackPower){
                // attackPower might be a range string; try to parse and add
                const parts = out.attackPower.toString().split('-').map(p=>parseInt(p));
                if(parts.length===2 && !isNaN(parts[0])){
                    out.attackPower = (parts[0]+atkPowerBonus) + ' - ' + (parts[1]+atkPowerBonus);
                }
            }
            if(atkRatingBonus && out.attackRating && !isNaN(Number(out.attackRating))){
                out.attackRating = Number(out.attackRating) + atkRatingBonus;
            }
            if(defBonus && out.defense){
                // defense stored as range string
                const parts = out.defense.toString().split('-').map(p=>parseInt(p));
                if(parts.length===2 && !isNaN(parts[0])){
                    out.defense = (parts[0]+defBonus) + ' - ' + (parts[1]+defBonus);
                }
            }
            if(absBonus && out.absorption){
                // out.absorption is a range like '4.8 - 5.3'
                const parts = out.absorption.toString().split('-').map(p=>parseFloat(p));
                if(parts.length===2 && !isNaN(parts[0])){
                    out.absorption = ( (parts[0]+absBonus).toFixed(1) ) + ' - ' + ( (parts[1]+absBonus).toFixed(1) );
                } else if(!isNaN(Number(out.absorption))){
                    out.absorption = (Number(out.absorption) + absBonus).toFixed(1);
                }
            }

            // render with explicit ordering for important keys
            const ordered_stats_keys = ['defense','absorption','block','hp','stamina','mana'];
            const container = document.getElementById('stats-'+idx);
            container.innerHTML = '';
            const renderOrder = [];
            ordered_stats_keys.forEach(k=>{ if(out.hasOwnProperty(k)) renderOrder.push(k); });
            Object.keys(out).forEach(k=>{ if(!renderOrder.includes(k)) renderOrder.push(k); });
            renderOrder.forEach(k=>{
                const el = document.createElement('div');
                el.textContent = k + ': ' + out[k];
                container.appendChild(el);
            });
        }
        function renderReqs(idx, item, spec){
            const base = item.requirements || {};
            const mods = SPEC_MODS[spec] || null;
            const display = {};
            // keys of interest
            ['level','strength','intelligence','talent','agility'].forEach(k=>{
                const v = base[k];
                if(v===undefined) { display[k] = '-'; return; }
                if(k==='level') { display[k] = v; return; }
                if(mods && mods[k]){
                    const pmin = mods[k].min;
                    const pmax = mods[k].max;
                    const low = Math.ceil(v * (1 + pmin));
                    const high = Math.ceil(v * (1 + pmax));
                    // ensure ascending order
                    const mn = Math.min(low, high);
                    const mx = Math.max(low, high);
                    display[k] = mn + ' - ' + mx;
                } else {
                    display[k] = v;
                }
            });

            const container = document.getElementById('reqs-'+idx);
            container.innerHTML = '';
            // enforce order for requirement keys
            const ordered_req_keys = ['strength','intelligence','talent','agility'];
            const reqOrder = [];
            // keep level first
            if(display.hasOwnProperty('level')){
                const elL = document.createElement('div');
                elL.textContent = 'level: ' + display['level'];
                container.appendChild(elL);
            }
            ordered_req_keys.forEach(k=>{ if(display.hasOwnProperty(k)) reqOrder.push(k); });
            Object.keys(display).forEach(k=>{ if(k==='level') return; if(!reqOrder.includes(k)) reqOrder.push(k); });
            reqOrder.forEach(k=>{
                const el = document.createElement('div');
                el.textContent = k + ': ' + display[k];
                container.appendChild(el);
            });
        }

        // initialize default borders on load
        window.addEventListener('DOMContentLoaded', ()=>{
            const slots = document.querySelectorAll('[id^="canvas-"]');
            slots.forEach((c)=>{
                const id = c.id.split('-')[1];
                const r = document.getElementById('rarity-'+id);
                if(r) changeRarity(id);
            });
            // render spec mods table for visibility
            try{
                const el = document.getElementById('spec-table');
                if(el){
                    el.textContent = JSON.stringify(SPEC_MODS, null, 2);
                }
            }catch(e){console.warn(e)}
            // update aggregates initially
            updateAggregates();
        });

        function gatherSelectedAssets(){
            const assets = [];
            // slots select ids are select-0 ... iterate all selects
            const selects = document.querySelectorAll('select[id^="select-"]');
            selects.forEach((s)=>{
                const id = parseInt(s.id.split('-')[1]);
                // exclude Arma 2 (0) and Arma 1 (2)
                // if(id===0 || id===2) return;
                if(s.value) assets.push(s.value);
            });
            return assets;
        }

        function updateAggregates(){
            // include per-slot rarity and spec when requesting aggregation
            const raw = [];
            const selects = document.querySelectorAll('select[id^="select-"]');
            selects.forEach((s)=>{
                const id = parseInt(s.id.split('-')[1]);
                //if(id===0 || id===2) return;
                if(!s.value) return;
                const rarity = document.getElementById('rarity-'+id).value || 'normal';
                const spec = document.getElementById('spec-'+id).value || '';
                raw.push({ asset: s.value, rarity: rarity, spec: spec });
            });
            fetch('/aggregate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ assets: raw })
            }).then(r=>r.json()).then(data=>{
                const el = document.getElementById('aggregate-results');
                el.innerHTML = '';
                if(!data) return;
                const s = data.stats || {};
                const r = data.requirements || {};
                const hs = document.createElement('div');
                hs.innerHTML = '<strong>Stats:</strong>';
                const ordered_stats_keys = ['defense','absorption','block','hp','stamina','mana'];
                const statOrder = [];
                ordered_stats_keys.forEach(k=>{ if(s.hasOwnProperty(k)) statOrder.push(k); });
                Object.keys(s).forEach(k=>{ if(!statOrder.includes(k)) statOrder.push(k); });
                statOrder.forEach(k=>{
                    const v = s[k];
                    const div = document.createElement('div');
                    if(Array.isArray(v)) div.textContent = k + ': ' + v[0] + ' - ' + v[1];
                    else div.textContent = k + ': ' + v;
                    hs.appendChild(div);
                });

                const hr = document.createElement('div');
                hr.style.marginTop = '8px';
                hr.innerHTML = '<strong>Requirements:</strong>';
                const ordered_req_keys = ['strength','intelligence','talent','agility'];
                // level first if present
                if(r.hasOwnProperty('level')){
                    const v = r['level'];
                    const div = document.createElement('div');
                    div.textContent = 'level: ' + v;
                    hr.appendChild(div);
                }
                const reqOrder = [];
                ordered_req_keys.forEach(k=>{ if(r.hasOwnProperty(k)) reqOrder.push(k); });
                Object.keys(r).forEach(k=>{ if(k==='level') return; if(!reqOrder.includes(k)) reqOrder.push(k); });
                reqOrder.forEach(k=>{
                    const v = r[k];
                    const div = document.createElement('div');
                    if(Array.isArray(v)) div.textContent = k + ': ' + v[0] + ' - ' + v[1];
                    else div.textContent = k + ': ' + v;
                    hr.appendChild(div);
                });
                el.appendChild(hs);
                el.appendChild(hr);
            }).catch(err=>{ console.warn(err); });
        }
    </script>
</body>
</html>
