<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyTale Build Calculator</title>
    <style>
        body { background:#000; color:#fff; font-family:Arial,Helvetica,sans-serif; }
        .title { text-align:center; color:#fff; margin:16px 0; }
        .slots { display:flex; flex-wrap:wrap; gap:12px; justify-content:center; }
        .slot {
            width:160px; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; border:4px solid #444; padding:8px; box-sizing:border-box; background:transparent; color:#fff; border-radius:10px;
        }
        .canvas { display:flex; align-items:center; justify-content:center; overflow:visible; background:transparent; }
        .canvas img { display:block; max-width:none; max-height:none; }
        .placeholder { display:block; }
        select { width:100%; margin-top:6px; }
        label { color:#fff; font-size:12px; }
    </style>
</head>
<body>
    <h1 class="title">SkyTale Build Calculator</h1>
    <div class="slots">
    {% for slot in slots %}
        {% set size = slot_sizes[slot.name] %}
        <div class="slot" id="slot-{{ loop.index0 }}">
            <strong>{{ slot.name }}</strong>
            <div class="canvas" id="canvas-{{ loop.index0 }}" style="width:{{ size.w }}px; height:{{ size.h }}px;">
                <div class="placeholder" id="ph-{{ loop.index0 }}" style="width:100%;height:100%;background:#000;"></div>
                <img id="img-{{ loop.index0 }}" src="" alt="" style="display:none;" />
            </div>
            <select id="select-{{ loop.index0 }}" onchange="updateImage({{ loop.index0 }})" style="margin-top:6px;">
                <option value="">— selecione —</option>
                {% for cat, items in slot_items[slot.name].items() %}
                    <optgroup label="--{{ cat|capitalize }}--">
                    {% for item in items %}
                        {% if item.assets and item.assets.assetFile %}
                        <option value="{{ item.assets.assetFile }}">{{ item.name_en }}</option>
                        {% endif %}
                    {% endfor %}
                    </optgroup>
                {% endfor %}
            </select>
            <label style="display:block;margin-top:6px;color:white;">Raridade:</label>
            <select id="rarity-{{ loop.index0 }}" onchange="changeRarity({{ loop.index0 }})">
                <option value="normal" selected>Normal</option>
                <option value="rare">Raro</option>
                <option value="epic">Épico</option>
                <option value="legendary">Lendário</option>
            </select>
        </div>
    {% endfor %}
    </div>

    <script>
        const rarityColors = {
            normal: '#2ecc71',
            rare: '#5dade2',
            epic: '#9b59b6',
            legendary: '#f1c40f'
        };

        function updateImage(idx){
            const s = document.getElementById('select-'+idx);
            const i = document.getElementById('img-'+idx);
            const ph = document.getElementById('ph-'+idx);
            const canvas = document.getElementById('canvas-'+idx);
            const val = s.value || '';
            if(val){
                i.src = val;
                i.style.display = 'block';
                ph.style.display = 'none';
                // ensure image is centered by flexbox; no resizing
                canvas.style.alignItems = 'center';
                canvas.style.justifyContent = 'center';
            } else {
                i.src = '';
                i.style.display = 'none';
                ph.style.display = 'block';
            }
        }


        function changeRarity(idx){
            const r = document.getElementById('rarity-'+idx).value || 'normal';
            const slot = document.getElementById('slot-'+idx);
            slot.style.border = '4px solid ' + (rarityColors[r] || rarityColors.normal);
            slot.style.borderRadius = '10px';
        }

        // initialize default borders on load
        window.addEventListener('DOMContentLoaded', ()=>{
            const slots = document.querySelectorAll('[id^="canvas-"]');
            slots.forEach((c)=>{
                const id = c.id.split('-')[1];
                const r = document.getElementById('rarity-'+id);
                if(r) changeRarity(id);
            });
        });
    </script>
</body>
</html>
